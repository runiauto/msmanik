<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Accounting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-r from-blue-400 to-cyan-300 min-h-screen p-6">

<!-- LOGIN SCREEN -->
<div id="loginPage" class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 text-center">
  <h2 class="text-xl font-bold mb-4">🔐 Login</h2>
  <input id="username" type="text" placeholder="Enter username" class="w-full p-2 border rounded mb-4" />
  <button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-6">
  <h1 class="text-2xl font-bold mb-4 text-center">💰 Personal Accounting</h1>

  <div class="grid grid-cols-3 gap-4 text-center mb-6">
    <div class="bg-green-100 p-4 rounded-xl">
      <p class="text-sm">Cash In</p>
      <h2 id="cashIn" class="text-xl font-bold">0</h2>
    </div>
    <div class="bg-red-100 p-4 rounded-xl">
      <p class="text-sm">Cash Out</p>
      <h2 id="cashOut" class="text-xl font-bold">0</h2>
    </div>
    <div class="bg-blue-100 p-4 rounded-xl">
      <p class="text-sm">Balance</p>
      <h2 id="balance" class="text-xl font-bold">0</h2>
    </div>
  </div>

  <div class="flex gap-2 mb-4">
    <input id="desc" type="text" placeholder="Description" class="flex-1 p-2 border rounded" />
    <input id="amount" type="number" placeholder="Amount" class="w-32 p-2 border rounded" />
  </div>

  <div class="flex gap-2 mb-4">
    <button onclick="addTransaction('in')" class="flex-1 bg-green-500 text-white p-2 rounded">Add Cash In</button>
    <button onclick="addTransaction('out')" class="flex-1 bg-red-500 text-white p-2 rounded">Add Cash Out</button>
  </div>

  <div class="flex gap-2 mb-4">
    <button onclick="exportCSV()" class="bg-gray-700 text-white px-3 py-2 rounded">Export Excel (CSV)</button>
    <button onclick="exportPDF()" class="bg-gray-900 text-white px-3 py-2 rounded">Export PDF</button>
  </div>

  <div class="mb-4">
    <input id="search" type="text" placeholder="Filter by Description..." oninput="renderTransactions()" class="w-full p-2 border rounded" />
  </div>

  <canvas id="chart" class="mb-6"></canvas>

  <ul id="transactions" class="space-y-2"></ul>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let chart;

function login() {
  const user = document.getElementById('username').value;

  if (user === 'msmanik') {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderTransactions();
  } else {
    alert('Invalid username');
  }
}

function saveToLocal() {
  localStorage.setItem('transactions', JSON.stringify(transactions));
}

function addTransaction(type) {
  const desc = document.getElementById('desc').value;
  const amount = parseFloat(document.getElementById('amount').value);

  if (!desc || !amount) {
    alert('Please enter description and amount');
    return;
  }

  transactions.push({ desc, amount, type });
  saveToLocal();
  renderTransactions();

  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
}

function renderTransactions() {
  const search = document.getElementById('search')?.value?.toLowerCase() || '';
  const list = document.getElementById('transactions');
  list.innerHTML = '';

  let cashIn = 0;
  let cashOut = 0;

  transactions.forEach((t, index) => {
    if (search && !t.desc.toLowerCase().includes(search)) return;
    if (t.type === 'in') cashIn += t.amount;
    else cashOut += t.amount;

    const li = document.createElement('li');
    li.className = "flex justify-between items-center p-2 rounded bg-gray-100";

    li.innerHTML = `
      <div>
        <p class="font-medium">${t.desc}</p>
        <p class="text-sm ${t.type==='in'?'text-green-600':'text-red-600'}">
          ${t.type==='in'?'+':'-'}${t.amount}
        </p>
      </div>
      <div class="flex gap-2">
        <button onclick="editTransaction(${index})" class="bg-yellow-400 px-2 py-1 rounded text-sm">Edit</button>
        <button onclick="deleteTransaction(${index})" class="bg-red-500 text-white px-2 py-1 rounded text-sm">Delete</button>
      </div>
    `;

    list.appendChild(li);
  });

  document.getElementById('cashIn').innerText = cashIn;
  document.getElementById('cashOut').innerText = cashOut;
  document.getElementById('balance').innerText = cashIn - cashOut;

  updateChart(cashIn, cashOut);
}

function updateChart(cashIn, cashOut) {
  const ctx = document.getElementById('chart');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Cash In', 'Cash Out'],
      datasets: [{ data: [cashIn, cashOut] }]
    }
  });
}

function editTransaction(index) {
  const t = transactions[index];

  const newDesc = prompt('Edit description:', t.desc);
  const newAmount = parseFloat(prompt('Edit amount:', t.amount));

  if (!newDesc || !newAmount) return;

  transactions[index].desc = newDesc;
  transactions[index].amount = newAmount;

  saveToLocal();
  renderTransactions();
}

function deleteTransaction(index) {
  transactions.splice(index, 1);
  saveToLocal();
  renderTransactions();
}

function exportCSV() {
  let csv = 'Description,Amount,Type\n';
  transactions.forEach(t => {
    csv += `${t.desc},${t.amount},${t.type}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'transactions.csv';
  link.click();
}

function exportPDF() {
  let content = 'Transactions:\n\n';
  transactions.forEach(t => {
    content += `${t.desc} - ${t.type} - ${t.amount}\n`;
  });

  const blob = new Blob([content], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'transactions.pdf';
  link.click();
}
</script>

</body>
</html>
