<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Accounting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-r from-blue-400 to-cyan-300 min-h-screen p-3 md:p-6">

<!-- LOGIN SCREEN -->
<div id="loginPage" class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-4 md:p-6 text-center">
  <h2 class="text-lg md:text-xl font-bold mb-4">🔐 Login</h2>
  <input id="username" type="text" placeholder="Enter username" class="w-full p-2 border rounded mb-4" />
  <button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden max-w-5xl mx-auto bg-white rounded-2xl shadow-lg p-3 md:p-6">
  <h1 class="text-xl md:text-2xl font-bold mb-4 text-center">💰 Personal Accounting</h1>

  <!-- Summary Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-4 text-center mb-6">
    <div class="bg-green-100 p-3 md:p-4 rounded-xl">
      <p class="text-sm">Cash In</p>
      <h2 id="cashIn" class="text-lg md:text-xl font-bold">0</h2>
    </div>
    <div class="bg-red-100 p-3 md:p-4 rounded-xl">
      <p class="text-sm">Cash Out</p>
      <h2 id="cashOut" class="text-lg md:text-xl font-bold">0</h2>
    </div>
    <div class="bg-blue-100 p-3 md:p-4 rounded-xl">
      <p class="text-sm">Balance</p>
      <h2 id="balance" class="text-lg md:text-xl font-bold">0</h2>
    </div>
  </div>

  <!-- Inputs (stack on mobile) -->
  <div class="flex flex-col md:flex-row gap-2 mb-4">
    <input id="date" type="date" class="p-2 border rounded w-full md:w-auto" />
    <input id="client" type="text" placeholder="Client Name" class="p-2 border rounded w-full" />
    <input id="desc" type="text" placeholder="Description" class="p-2 border rounded w-full" />
    <input id="amount" type="number" placeholder="Amount" class="p-2 border rounded w-full md:w-32" />
  </div>

  <!-- Buttons -->
  <div class="flex flex-col sm:flex-row gap-2 mb-4">
    <button onclick="addTransaction('in')" class="w-full bg-green-500 text-white p-2 rounded">Add Cash In</button>
    <button onclick="addTransaction('out')" class="w-full bg-red-500 text-white p-2 rounded">Add Cash Out</button>
  </div>

  <div class="flex flex-col sm:flex-row gap-2 mb-4">
    <button onclick="exportCSV()" class="w-full bg-gray-700 text-white px-3 py-2 rounded">Export Excel (CSV)</button>
    <button onclick="exportPDF()" class="w-full bg-gray-900 text-white px-3 py-2 rounded">Export PDF</button>
  </div>

  <!-- Search -->
  <div class="mb-4">
    <input id="search" type="text" placeholder="Filter by Client Name..." oninput="renderTransactions()" class="w-full p-2 border rounded" />
  </div>

  <!-- Transactions -->
  <ul id="transactions" class="space-y-2 mb-6"></ul>

  <!-- Charts -->
  <h2 class="text-base md:text-lg font-semibold mb-2">📊 Overall Analytics</h2>
  <div class="w-full overflow-x-auto">
    <canvas id="chart" class="mb-6"></canvas>
  </div>

  <h2 class="text-base md:text-lg font-semibold mb-2">👥 Client-wise Analytics</h2>
  <div class="w-full overflow-x-auto">
    <canvas id="clientChart"></canvas>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let chart;
let clientChart;

function login() {
  const user = document.getElementById('username').value;

  if (user === 'msmanik') {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderTransactions();
  } else {
    alert('Invalid username');
  }
}

function saveToLocal() {
  localStorage.setItem('transactions', JSON.stringify(transactions));
}

function addTransaction(type) {
  const date = document.getElementById('date').value;
  const client = document.getElementById('client').value;
  const desc = document.getElementById('desc').value;
  const amount = parseFloat(document.getElementById('amount').value);

  if (!date || !client || !desc || isNaN(amount)) {
    alert('Please enter all fields correctly');
    return;
  }

  transactions.push({ date, client, desc, amount, type });
  saveToLocal();
  renderTransactions();

  document.getElementById('date').value = '';
  document.getElementById('client').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
}

function renderTransactions() {
  const search = document.getElementById('search')?.value?.toLowerCase() || '';
  const list = document.getElementById('transactions');
  list.innerHTML = '';

  let cashIn = 0;
  let cashOut = 0;

  transactions.forEach((t, index) => {
    if (search && !t.client.toLowerCase().includes(search)) return;
    if (t.type === 'in') cashIn += t.amount;
    else cashOut += t.amount;

    const li = document.createElement('li');
    li.className = "flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 p-2 rounded bg-gray-100";

    li.innerHTML = `
      <div>
        <p class="font-medium text-sm md:text-base">${t.date} | ${t.client} - ${t.desc}</p>
        <p class="text-sm ${t.type==='in'?'text-green-600':'text-red-600'}">
          ${t.type==='in'?'+':'-'}${t.amount}
        </p>
      </div>
      <div class="flex gap-2">
        <button onclick="editTransaction(${index})" class="bg-yellow-400 px-2 py-1 rounded text-xs md:text-sm">Edit</button>
        <button onclick="deleteTransaction(${index})" class="bg-red-500 text-white px-2 py-1 rounded text-xs md:text-sm">Delete</button>
      </div>
    `;

    list.appendChild(li);
  });

  document.getElementById('cashIn').innerText = cashIn;
  document.getElementById('cashOut').innerText = cashOut;
  document.getElementById('balance').innerText = cashIn - cashOut;

  updateChart(cashIn, cashOut);
  updateClientChart();
}

function updateChart(cashIn, cashOut) {
  const ctx = document.getElementById('chart');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Cash In', 'Cash Out'],
      datasets: [{ data: [cashIn, cashOut] }]
    }
  });
}

function updateClientChart() {
  const ctx = document.getElementById('clientChart');
  if (clientChart) clientChart.destroy();

  const clientIncome = {};
  const clientExpense = {};

  transactions.forEach(t => {
    if (!clientIncome[t.client]) {
      clientIncome[t.client] = 0;
      clientExpense[t.client] = 0;
    }
    if (t.type === 'in') clientIncome[t.client] += t.amount;
    else clientExpense[t.client] += t.amount;
  });

  const labels = Object.keys(clientIncome);
  const incomeData = labels.map(c => clientIncome[c]);
  const expenseData = labels.map(c => clientExpense[c]);

  clientChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'Income', data: incomeData },
        { label: 'Expense', data: expenseData }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } }
    }
  });
}

function editTransaction(index) {
  const t = transactions[index];
  const newDate = prompt('Edit date (YYYY-MM-DD):', t.date);
  const newClient = prompt('Edit client:', t.client);
  const newDesc = prompt('Edit description:', t.desc);
  const newAmount = parseFloat(prompt('Edit amount:', t.amount));

  if (!newDate || !newClient || !newDesc || isNaN(newAmount)) return;

  transactions[index].date = newDate;
  transactions[index].client = newClient;
  transactions[index].desc = newDesc;
  transactions[index].amount = newAmount;

  saveToLocal();
  renderTransactions();
}

function deleteTransaction(index) {
  transactions.splice(index, 1);
  saveToLocal();
  renderTransactions();
}

function exportCSV() {
  let rows = [['Date','Client','Description','Amount','Type']];
  transactions.forEach(t => rows.push([t.date, t.client, t.desc, t.amount, t.type]));
  const csv = rows.map(e => e.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'transactions.csv';
  link.click();
}

function exportPDF() {
  let content = 'Transactions:\n\n';
  transactions.forEach(t => {
    content += `${t.date} | ${t.client} - ${t.desc} - ${t.type} - ${t.amount}\n`;
  });
  const blob = new Blob([content], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'transactions.pdf';
  link.click();
}
</script>

</body>
</html>
